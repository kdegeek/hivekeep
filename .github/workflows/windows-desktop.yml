name: Windows Desktop CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs-site/**'
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs-site/**'
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: windows-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Build Windows desktop bundle
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Tauri prerequisites
        shell: pwsh
        run: |
          choco install nsis wixtoolset -y --no-progress

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build desktop client
        run: bun run desktop:build

      - name: Build Tauri Windows bundle
        run: bunx tauri build --bundles msi,nsis
        env:
          # Require a signed bundle on push/workflow_dispatch (where secrets are
          # available); PR builds (incl. forks without secret access) may stay
          # unsigned so the build still passes without leaking signing material.
          WINDOWS_SIGNING_REQUIRED: ${{ github.event_name != 'pull_request' }}
          WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT }}
          WINDOWS_SIGNING_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_SIGNING_DIGEST_ALGORITHM }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: hivekeep-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hivekeep-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
