name: Windows Desktop Release

# Builds, signs, and publishes a GitHub Release for the Windows desktop shell,
# including the updater manifest (latest.json) that the Tauri updater plugin
# polls (see plugins.updater.endpoints in src-tauri/tauri.conf.json). Separate
# from windows-desktop.yml, which only builds artifacts for CI verification
# and never publishes anything.
#
# Requires (repo secrets), beyond the Windows code-signing secrets already
# used by windows-desktop.yml:
#   TAURI_SIGNING_PRIVATE_KEY           - output of `bunx tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  - password for that key, if one was set
# Without these two, the build still produces installers but they won't carry
# an update signature, and the desktop app's "check for update" will not trust
# them.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.10.0). Defaults to the current package.json version."
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, and publish Windows desktop release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Install Tauri prerequisites
        shell: pwsh
        run: |
          choco install nsis wixtoolset -y --no-progress

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if (-not $tag) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $version = (Get-Content package.json | ConvertFrom-Json).version
              $tag = "v$version"
            }
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build, sign, and publish via Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows Authenticode signing (installer/uninstaller) — same gating
          # as windows-desktop.yml: required once a cert secret is present.
          WINDOWS_SIGNING_REQUIRED: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 != '' || secrets.WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT != '' }}
          WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT }}
          WINDOWS_SIGNING_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_SIGNING_DIGEST_ALGORITHM }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
          # Tauri updater artifact signing (separate keypair from the above —
          # signs the update payload itself, not the Windows installer).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: "Hivekeep Desktop ${{ steps.release_tag.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: --bundles msi,nsis
